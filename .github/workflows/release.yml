name: Build and Release Firmware

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build Firmware
        run: pio run

      - name: Prepare Release Files
        run: |
          mkdir -p release
          cp .pio/build/esp32-2432S028/firmware.bin release/tikitaka-${{ github.ref_name }}.bin

          # Checksumme erstellen
          cd release
          sha256sum tikitaka-${{ github.ref_name }}.bin > tikitaka-${{ github.ref_name }}.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/tikitaka-${{ github.ref_name }}.bin
            release/tikitaka-${{ github.ref_name }}.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
