name: Build and Release Firmware

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO and esptool
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Build Firmware
        run: pio run

      - name: Create Merged Binary
        run: |
          mkdir -p release

          # Pfade zu den Build-Artefakten
          BUILD_DIR=".pio/build/esp32-2432S028"

          # boot_app0.bin finden (PlatformIO legt es unterschiedlich ab)
          BOOT_APP0=$(find ~/.platformio -name "boot_app0.bin" | head -1)

          # Merged Binary erstellen (Bootloader + Partitions + Firmware)
          # ESP32 Flash Layout:
          # 0x1000  - bootloader.bin
          # 0x8000  - partitions.bin
          # 0xe000  - boot_app0.bin
          # 0x10000 - firmware.bin
          python -m esptool --chip esp32 merge_bin \
            --output release/tikitaka-${{ github.ref_name }}.bin \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 4MB \
            0x1000 $BUILD_DIR/bootloader.bin \
            0x8000 $BUILD_DIR/partitions.bin \
            0xe000 $BOOT_APP0 \
            0x10000 $BUILD_DIR/firmware.bin

          # Checksumme erstellen
          cd release
          sha256sum tikitaka-${{ github.ref_name }}.bin > tikitaka-${{ github.ref_name }}.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/tikitaka-${{ github.ref_name }}.bin
            release/tikitaka-${{ github.ref_name }}.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
